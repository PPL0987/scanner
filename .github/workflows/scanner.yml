name: JTS MACD+CDC Scanner

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run scanner
        run: python scanner_cdc.py

      - name: Commit scanner-data.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scanner-data.json
          git diff --staged --quiet || git commit -m "Update scanner-data.json $(date +'%Y-%m-%d')"
          git push
